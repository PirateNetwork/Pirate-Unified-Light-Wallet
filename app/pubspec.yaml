name: pirate_wallet
description: Pirate Unified Wallet - Privacy-first ARRR wallet
publish_to: 'none'
version: 1.0.6+6

environment:
  sdk: '>=3.10.0 <4.0.0'

dependencies:
  archive: ^4.0.9
  bitsdojo_window: ^0.1.6
  crypto: ^3.0.7
  cupertino_icons: ^1.0.9
