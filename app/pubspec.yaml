  komodo_coins:
    git:
      url: https://github.com/OswaldKardingson/komodo-defi-sdk-flutter.git
      ref: main
      path: packages/komodo_coins
  komodo_defi_framework:
    git:
      url: https://github.com/OswaldKardingson/komodo-defi-sdk-flutter.git
      ref: main
      path: packages/komodo_defi_framework
  komodo_defi_local_auth:
    git:
      url: https://github.com/OswaldKardingson/komodo-defi-sdk-flutter.git
      ref: main
