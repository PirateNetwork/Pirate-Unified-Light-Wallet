      url: https://github.com/OswaldKardingson/komodo-defi-sdk-flutter.git
      ref: main
      path: packages/komodo_defi_rpc_methods
  komodo_defi_sdk:
    git:
      url: https://github.com/OswaldKardingson/komodo-defi-sdk-flutter.git
