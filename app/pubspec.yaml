  komodo_ui:
    git:
      url: https://github.com/OswaldKardingson/komodo-defi-sdk-flutter.git
      ref: main
      path: packages/komodo_ui
  komodo_wallet_build_transformer:
    git:
      url: https://github.com/OswaldKardingson/komodo-defi-sdk-flutter.git
      ref: main
      path: packages/komodo_wallet_build_transformer
  local_auth: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/i18n/
    - assets/bip39/
  
  # Fonts (local only)
  fonts:
    - family: Sora
      fonts:
        - asset: assets/fonts/Sora/Sora.ttf
    - family: JetBrainsMono
      fonts:
        - asset: assets/fonts/JetBrainsMono/JetBrainsMono.ttf
